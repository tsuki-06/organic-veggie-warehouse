<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organic Veggie Warehouse - จัดการผัก</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-emerald-50 text-slate-800">
    <header class="bg-emerald-800 text-emerald-50 shadow-md">
        <div class="mx-auto max-w-7xl px-4 py-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
            <div>
                <p class="text-sm uppercase tracking-[0.25em] text-emerald-200">Organic Veggie Warehouse</p>
                <h1 class="text-2xl font-semibold">หน้าจัดการผัก</h1>
            </div>
            <div class="flex flex-wrap items-center gap-2">
                <a href="{{ url_for('index') }}" class="rounded-full bg-emerald-200 px-4 py-2 text-emerald-900 hover:bg-emerald-100 transition">กลับหน้าหลัก</a>
            </div>
        </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
        <section class="mb-6 rounded-3xl border border-emerald-100 bg-white p-5 shadow-sm">
            <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
                <div>
                    <h2 class="text-xl font-semibold text-slate-900">รายการผัก</h2>
                    <p class="text-sm text-slate-600">ดูรายการผักที่เก็บในคลัง และจัดการข้อมูลผักต่างๆได้ทันที</p>
                </div>
                <a href="{{ url_for('add_vegetable') }}" class="inline-flex items-center justify-center rounded-full bg-emerald-700 px-5 py-3 text-sm font-semibold text-white shadow hover:bg-emerald-600 transition">เพิ่มผักใหม่</a>
            </div>
        </section>

        <section class="overflow-x-auto rounded-3xl bg-emerald-100/80 p-4 shadow-sm">
            <table class="min-w-full divide-y divide-emerald-200 text-sm">
                <thead class="bg-emerald-900 text-white">
                    <tr>
                        <th class="px-4 py-3 text-left uppercase tracking-wide">veg_id</th>
                        <th class="px-4 py-3 text-left uppercase tracking-wide">veg_name</th>
                        <th class="px-4 py-3 text-left uppercase tracking-wide">category</th>
                        <th class="px-4 py-3 text-left uppercase tracking-wide">storage_temp</th>
                        <th class="px-4 py-3 text-left uppercase tracking-wide">จัดการ</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-emerald-100 bg-white">
                    {% for veg in veggies %}
                    <tr class="hover:bg-emerald-50">
                        <td class="px-4 py-4">{{ veg[0] }}</td>
                        <td class="px-4 py-4">{{ veg[1] }}</td>
                        <td class="px-4 py-4">{{ veg[2] }}</td>
                        <td class="px-4 py-4">{{ veg[3] }}</td>
                        <td class="px-4 py-4 space-x-2">
                            <a href="{{ url_for('edit_vegetable', id=veg[0]) }}" class="inline-flex rounded-full bg-amber-300 px-3 py-2 text-sm font-semibold text-amber-900 hover:bg-amber-200 transition">แก้ไข</a>
                            <form method="post" action="{{ url_for('delete_vegetable', id=veg[0]) }}" class="inline-block">
                                <button type="submit" onclick="return confirm('ยืนยันการลบข้อมูลผักนี้หรือไม่?')" class="inline-flex rounded-full bg-rose-500 px-3 py-2 text-sm font-semibold text-white hover:bg-rose-400 transition">ลบ</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
